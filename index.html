<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO 앱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #e0e7ff;
      --surface: #ffffff;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.15), 0 4px 10px -5px rgba(0,0,0,0.1);
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 48px 16px 80px;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 640px; margin: 0 auto; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 32px; }
    .title {
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 800;
      color: white;
      letter-spacing: 0.35em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }
    .subtitle { color: rgba(255,255,255,0.7); margin-top: 6px; font-size: 0.9rem; }

    /* ── Input card ── */
    .input-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-lg);
    }

    .input-row { display: flex; gap: 10px; }

    .todo-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    .todo-input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .todo-input::placeholder { color: #b0bac6; }

    .add-btn {
      padding: 12px 22px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(99,102,241,0.35);
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .add-btn:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(99,102,241,0.45); }
    .add-btn:active { transform: scale(0.97); }
    .add-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }

    .priority-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .priority-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; }

    .p-btn {
      padding: 4px 14px;
      border-radius: 20px;
      border: 2px solid;
      background: transparent;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s;
    }
    .p-btn[data-p="high"]   { border-color: #ef4444; color: #dc2626; }
    .p-btn[data-p="medium"] { border-color: #f59e0b; color: #d97706; }
    .p-btn[data-p="low"]    { border-color: #22c55e; color: #16a34a; }
    .p-btn[data-p="high"].active   { background: #ef4444; color: white; }
    .p-btn[data-p="medium"].active { background: #f59e0b; color: white; }
    .p-btn[data-p="low"].active    { background: #22c55e; color: white; }
    .p-btn[data-p="high"]:not(.active):hover   { background: #fef2f2; }
    .p-btn[data-p="medium"]:not(.active):hover { background: #fffbeb; }
    .p-btn[data-p="low"]:not(.active):hover    { background: #f0fdf4; }

    /* ── Todo card ── */
    .todo-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      flex-wrap: wrap;
    }
    .filter-stats { font-size: 0.82rem; color: var(--muted); flex: 1; }
    .stat-num { font-weight: 700; color: var(--primary); font-size: 0.9rem; }

    .filter-buttons { display: flex; gap: 4px; }
    .f-btn {
      padding: 5px 14px;
      border: 1.5px solid var(--border);
      background: white;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }
    .f-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    .f-btn.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: 600; }

    .clear-btn {
      padding: 5px 12px;
      border: 1.5px solid #fca5a5;
      background: white;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      color: #ef4444;
      cursor: pointer;
      transition: all 0.18s;
    }
    .clear-btn:hover { background: #fef2f2; border-color: #ef4444; }

    /* ── Todo list ── */
    .todo-list { list-style: none; }

    /* ── Todo item ── */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 14px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: background 0.15s;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: #f8fafc; }
    .todo-item:hover .item-actions { opacity: 1; pointer-events: auto; }

    .pbar {
      position: absolute;
      left: 0; top: 8px; bottom: 8px;
      width: 4px;
      border-radius: 0 3px 3px 0;
    }
    .pbar.high   { background: #ef4444; }
    .pbar.medium { background: #f59e0b; }
    .pbar.low    { background: #22c55e; }

    .checkbox {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      color: white;
      flex-shrink: 0;
      transition: all 0.2s;
      font-family: inherit;
    }
    .checkbox:hover { border-color: var(--primary); background: var(--primary-light); }
    .checkbox.checked {
      background: var(--primary); border-color: var(--primary);
      box-shadow: 0 2px 6px rgba(99,102,241,0.35);
    }

    .item-content {
      flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0;
    }

    .item-text {
      flex: 1; font-size: 0.95rem; color: var(--text);
      word-break: break-word; line-height: 1.5; cursor: default;
    }
    .todo-item.done .item-text { text-decoration: line-through; color: #94a3b8; }

    .pbadge {
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 12px; flex-shrink: 0;
    }
    .pbadge.high   { color: #dc2626; background: #fef2f2; }
    .pbadge.medium { color: #d97706; background: #fffbeb; }
    .pbadge.low    { color: #16a34a; background: #f0fdf4; }

    .edit-input {
      flex: 1; padding: 5px 10px;
      border: 2px solid var(--primary);
      border-radius: 6px; font-size: 0.95rem;
      font-family: inherit; outline: none;
      background: white;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .item-actions {
      display: flex; gap: 2px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .act-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: var(--muted);
      font-family: inherit; transition: background 0.15s, color 0.15s;
    }
    .act-btn.edit-b:hover  { background: var(--primary-light); color: var(--primary); }
    .act-btn.del-b:hover   { background: #fef2f2; color: #ef4444; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
    .empty-icon  { font-size: 3.5rem; display: block; margin-bottom: 16px; line-height: 1; }
    .empty-state p { font-size: 0.9rem; font-weight: 500; }

    /* ── Footer ── */
    .hint {
      text-align: center; margin-top: 16px;
      font-size: 0.75rem; color: rgba(255,255,255,0.5);
    }

    @media (max-width: 480px) {
      body { padding: 28px 12px 60px; }
      .item-actions { opacity: 1; pointer-events: auto; }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1 class="title">TODO</h1>
    <p class="subtitle">할 일을 체계적으로 관리하세요</p>
  </header>

  <!-- Input -->
  <div class="input-card">
    <div class="input-row">
      <input id="todoInput" class="todo-input" type="text" placeholder="새로운 할 일을 입력하세요..." maxlength="200" autofocus />
      <button id="addBtn" class="add-btn" disabled>+ 추가</button>
    </div>
    <div class="priority-row">
      <span class="priority-label">우선순위</span>
      <button class="p-btn" data-p="high">높음 🔴</button>
      <button class="p-btn active" data-p="medium">중간 🟡</button>
      <button class="p-btn" data-p="low">낮음 🟢</button>
    </div>
  </div>

  <!-- Todo card -->
  <div class="todo-card">
    <div class="filter-bar">
      <div class="filter-stats">
        <span id="activeCount" class="stat-num">0</span>개 남음
        <span id="totalInfo" style="margin-left:6px;opacity:0.6"></span>
      </div>
      <div class="filter-buttons">
        <button class="f-btn active" data-f="all">전체</button>
        <button class="f-btn" data-f="active">진행 중</button>
        <button class="f-btn" data-f="completed">완료</button>
      </div>
      <button id="clearBtn" class="clear-btn" style="display:none">완료 삭제</button>
    </div>
    <ul id="todoList" class="todo-list"></ul>
    <div id="emptyState" class="empty-state" style="display:none">
      <span class="empty-icon" id="emptyIcon"></span>
      <p id="emptyMsg"></p>
    </div>
  </div>

  <p class="hint" id="hint" style="display:none">더블클릭하여 할 일을 수정할 수 있습니다</p>
</div>

<script>
  const STORAGE_KEY = 'todo-app-v1'
  const PRIORITY_LABELS = { high: '높음', medium: '중간', low: '낮음' }
  const EMPTY = {
    all:       { icon: '📝', text: '할 일이 없습니다. 새로운 할 일을 추가해보세요!' },
    active:    { icon: '🎉', text: '모든 할 일을 완료했습니다!' },
    completed: { icon: '📋', text: '완료된 할 일이 없습니다.' },
  }

  // ── State ──────────────────────────────────────────────
  let todos = []
  let filter = 'all'
  let priority = 'medium'
  let editingId = null

  function load() {
    try { todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch { todos = [] }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos))
  }

  // ── Mutations ──────────────────────────────────────────
  function addTodo(text) {
    todos.unshift({ id: `${Date.now()}-${Math.random().toString(36).slice(2)}`, text, completed: false, priority, createdAt: Date.now() })
    save(); render()
  }
  function toggleTodo(id) {
    const t = todos.find(t => t.id === id)
    if (t) { t.completed = !t.completed; save(); render() }
  }
  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id); save(); render()
  }
  function saveTodo(id, text) {
    const t = todos.find(t => t.id === id)
    if (t && text.trim()) { t.text = text.trim(); save() }
    editingId = null; render()
  }
  function clearCompleted() {
    todos = todos.filter(t => !t.completed); save(); render()
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const activeCount = todos.filter(t => !t.completed).length
    const completedCount = todos.filter(t => t.completed).length

    // stats
    document.getElementById('activeCount').textContent = activeCount
    const totalEl = document.getElementById('totalInfo')
    totalEl.textContent = todos.length > 0 ? `/ 총 ${todos.length}개` : ''

    // clear btn
    const clearBtn = document.getElementById('clearBtn')
    clearBtn.style.display = completedCount > 0 ? '' : 'none'
    clearBtn.textContent = `완료 삭제 (${completedCount})`

    // hint
    document.getElementById('hint').style.display = todos.length > 0 ? '' : 'none'

    // filter buttons
    document.querySelectorAll('.f-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.f === filter)
    })

    // filtered list
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.completed
      if (filter === 'completed') return t.completed
      return true
    })

    const list = document.getElementById('todoList')
    const empty = document.getElementById('emptyState')

    if (filtered.length === 0) {
      list.innerHTML = ''
      empty.style.display = ''
      document.getElementById('emptyIcon').textContent = EMPTY[filter].icon
      document.getElementById('emptyMsg').textContent = EMPTY[filter].text
    } else {
      empty.style.display = 'none'
      list.innerHTML = filtered.map(t => renderItem(t)).join('')
      attachItemEvents()
    }
  }

  function renderItem(t) {
    const isEditing = editingId === t.id
    const contentHtml = isEditing
      ? `<input class="edit-input" data-id="${t.id}" value="${escHtml(t.text)}" maxlength="200" />`
      : `<span class="item-text" data-id="${t.id}">${escHtml(t.text)}</span>
         <span class="pbadge ${t.priority}">${PRIORITY_LABELS[t.priority]}</span>`

    const editBtn = (!t.completed && !isEditing)
      ? `<button class="act-btn edit-b" data-id="${t.id}" title="수정">✎</button>`
      : ''

    return `
      <li class="todo-item${t.completed ? ' done' : ''}" data-id="${t.id}">
        <div class="pbar ${t.priority}"></div>
        <button class="checkbox${t.completed ? ' checked' : ''}" data-id="${t.id}">${t.completed ? '✓' : ''}</button>
        <div class="item-content">${contentHtml}</div>
        <div class="item-actions">
          ${editBtn}
          <button class="act-btn del-b" data-id="${t.id}" title="삭제">✕</button>
        </div>
      </li>`
  }

  function attachItemEvents() {
    // Checkbox toggle
    document.querySelectorAll('.checkbox').forEach(btn => {
      btn.addEventListener('click', () => toggleTodo(btn.dataset.id))
    })
    // Edit button
    document.querySelectorAll('.edit-b').forEach(btn => {
      btn.addEventListener('click', () => { editingId = btn.dataset.id; render(); focusEdit(btn.dataset.id) })
    })
    // Delete button
    document.querySelectorAll('.del-b').forEach(btn => {
      btn.addEventListener('click', () => deleteTodo(btn.dataset.id))
    })
    // Double-click to edit text
    document.querySelectorAll('.item-text').forEach(span => {
      span.addEventListener('dblclick', () => {
        const id = span.dataset.id
        const t = todos.find(t => t.id === id)
        if (t && !t.completed) { editingId = id; render(); focusEdit(id) }
      })
    })
    // Edit input events
    document.querySelectorAll('.edit-input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveTodo(input.dataset.id, input.value)
        else if (e.key === 'Escape') { editingId = null; render() }
      })
      input.addEventListener('blur', () => saveTodo(input.dataset.id, input.value))
    })
  }

  function focusEdit(id) {
    const el = document.querySelector(`.edit-input[data-id="${id}"]`)
    if (el) { el.focus(); el.select() }
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
  }

  // ── Input area ─────────────────────────────────────────
  const input = document.getElementById('todoInput')
  const addBtn = document.getElementById('addBtn')

  input.addEventListener('input', () => {
    addBtn.disabled = !input.value.trim()
  })
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && input.value.trim()) { addTodo(input.value); input.value = ''; addBtn.disabled = true }
  })
  addBtn.addEventListener('click', () => {
    if (input.value.trim()) { addTodo(input.value); input.value = ''; addBtn.disabled = true; input.focus() }
  })

  // Priority buttons
  document.querySelectorAll('.p-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      priority = btn.dataset.p
      document.querySelectorAll('.p-btn').forEach(b => b.classList.toggle('active', b.dataset.p === priority))
    })
  })

  // Filter buttons
  document.querySelectorAll('.f-btn').forEach(btn => {
    btn.addEventListener('click', () => { filter = btn.dataset.f; render() })
  })

  // Clear completed
  document.getElementById('clearBtn').addEventListener('click', clearCompleted)

  // ── Boot ───────────────────────────────────────────────
  load()
  render()
</script>
</body>
</html>
